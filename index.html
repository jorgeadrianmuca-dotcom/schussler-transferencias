<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datos de Transferencia | SCHUSSLER S.A.</title>
  <link rel="icon" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f1f5f9;
      color: #1e293b;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background-color: #ffffff;
      padding: 35px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 51, 102, 0.08);
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    /* Contenedor alineado para los dos logos */
    .logo {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .logo img {
      max-width: 130px;
      max-height: 60px;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    h1 {
      font-size: 1.35rem;
      color: #003366;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .subtitulo {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 25px;
    }

    .contenedor-tarjetas {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 22px;
    }

    .tarjeta {
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-left: 4px solid #003366;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    .tarjeta:hover {
      background-color: #f0f7ff;
      border-color: #93c5fd;
      border-left-color: #002244;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 51, 102, 0.06);
    }

    .tarjeta:active {
      transform: translateY(0);
    }

    .etiqueta {
      font-size: 0.75rem;
      color: #64748b;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .valor {
      font-size: 0.95rem;
      color: #0f172a;
      font-weight: 600;
      word-break: break-all;
    }

    button {
      width: 100%;
      background-color: #003366;
      color: #ffffff;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
      box-shadow: 0 4px 12px rgba(0, 51, 102, 0.2);
    }

    button:hover {
      background-color: #002244;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    #mensaje {
      display: none;
      color: #15803d;
      background-color: #dcfce7;
      border: 1px solid #bbf7d0;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      margin-top: 18px;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="SCHUSSLER">
      <img src="logo2.png" alt="Segundo Logo">
    </div>

    <h1>DATOS DE TRANSFERENCIA</h1>
    <p class="subtitulo">Toque cualquier tarjeta para copiar el dato.</p>

    <div class="contenedor-tarjetas">
      <div class="tarjeta" onclick="copiarDato('SCHUSSLER S.A.')">
        <span class="etiqueta">Razón Social:</span>
        <span class="valor">SCHUSSLER S.A.</span>
      </div>

      <div class="tarjeta" onclick="copiarDato('78.813.720-6')">
        <span class="etiqueta">RUT:</span>
        <span class="valor">78.813.720-6</span>
      </div>

      <div class="tarjeta" onclick="copiarDato('Banco de Chile')">
        <span class="etiqueta">Banco:</span>
        <span class="valor">Banco de Chile</span>
      </div>

      <div class="tarjeta" onclick="copiarDato('Cuenta Corriente')">
        <span class="etiqueta">Tipo de Cuenta:</span>
        <span class="valor">Cuenta Corriente</span>
      </div>

      <div class="tarjeta" onclick="copiarDato('225-00338-04')">
        <span class="etiqueta">Número de Cuenta:</span>
        <span class="valor">225-00338-04</span>
      </div>

      <div class="tarjeta" onclick="copiarDato('cobranzas@schussler.cl')">
        <span class="etiqueta">Correo:</span>
        <span class="valor">cobranzas@schussler.cl</span>
      </div>
    </div>

    <button onclick="copiarTodo()">Copiar todos los datos</button>

    <div id="mensaje">✓ Datos copiados correctamente</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
